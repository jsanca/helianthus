datasources:
  default:
    type: h2
  secondary:
    type: h2

operations:
  # Default result
  all-products:
    query: SELECT * FROM products ORDER BY PRODUCTCODE
    configurations:
      default:
        pipeline:
          - limit: 100

  # Required parameter
  get-product:
    query: SELECT * FROM products WHERE PRODUCTCODE = ?
    parameters:
      - name: productCode
        type: string
        required: true
    configurations:
      default:
        pipeline:
          - limit: 1

  # Default + Projected + Filtered
  products:
    queryRef: products.base
    configurations:
      default:
        pipeline:
          - limit: 100
      compact:
        pipeline:
          - project: [PRODUCTCODE, PRODUCTNAME, PRODUCTLINE]
          - limit: 50
      expensive:
        pipeline:
          - filter:
              BUYPRICE:
                gt: 50
          - project: [PRODUCTCODE, PRODUCTNAME, BUYPRICE]
          - limit: 100

  # Default for productlines
  productlines:
    queryRef: productlines.base
    configurations:
      default:
        pipeline:
          - limit: 100

  # Required parameter (single product lookup)
  product:
    query: SELECT * FROM products WHERE PRODUCTCODE = ?
    parameters:
      - name: productCode
        type: string
        required: true
    configurations:
      default:
        pipeline:
          - limit: 1

  # Select input parameter
  products-by-line:
    query: SELECT * FROM products WHERE PRODUCTLINE = ? ORDER BY PRODUCTCODE
    parameters:
      - name: productLine
        type: string
        required: true
        label: Product Line
        description: Select a product line category
        input:
          kind: select
          options:
            - Classic Cars
            - Motorcycles
            - Planes
    configurations:
      default:
        pipeline:
          - limit: 100

  # Number input parameter
  products-by-price:
    query: SELECT * FROM products WHERE BUYPRICE >= ? AND BUYPRICE <= ? ORDER BY BUYPRICE
    parameters:
      - name: minPrice
        type: number
        required: true
        label: Minimum Price
        input:
          kind: number
          min: 0
      - name: maxPrice
        type: number
        required: true
        label: Maximum Price
        input:
          kind: number
          min: 0
    configurations:
      default:
        pipeline:
          - limit: 100

  # Optional parameters with named parameter binding
  products-search:
    query: |
      SELECT * FROM products
      WHERE (:productLine IS NULL OR PRODUCTLINE = :productLine)
        AND (:minPrice IS NULL OR BUYPRICE >= :minPrice)
      ORDER BY PRODUCTCODE
    parameters:
      - name: productLine
        type: string
        required: false
        label: Product Line (Optional)
        input:
          kind: select
          options:
            - Classic Cars
            - Motorcycles
            - Planes
      - name: minPrice
        type: number
        required: false
        label: Minimum Price (Optional)
        input:
          kind: number
          min: 0
    configurations:
      default:
        pipeline:
          - limit: 100

  # Boolean input
  products-in-stock:
    query: SELECT * FROM products WHERE (? = false OR QUANTITYINSTOCK > 0) ORDER BY QUANTITYINSTOCK DESC
    parameters:
      - name: inStockOnly
        type: boolean
        required: false
        label: In Stock Only
        input:
          kind: boolean
    configurations:
      default:
        pipeline:
          - limit: 100

  # Admin-only operation
  inventory-report:
    query: SELECT PRODUCTCODE, PRODUCTNAME, QUANTITYINSTOCK, BUYPRICE, (QUANTITYINSTOCK * BUYPRICE) as TOTALVALUE FROM products ORDER BY TOTALVALUE DESC
    security:
      roles:
        - ADMIN
    configurations:
      default:
        pipeline:
          - limit: 100

  # Guest-visible operation
  public-catalog:
    query: SELECT PRODUCTCODE, PRODUCTNAME, PRODUCTLINE, BUYPRICE FROM products ORDER BY PRODUCTNAME
    security:
      roles:
        - GUEST
        - ADMIN
    configurations:
      default:
        pipeline:
          - limit: 50

  # Secondary datasource operations
  customers:
    label: Customers
    description: Customer list from secondary database
    datasource: secondary
    query: SELECT CUSTOMERNUMBER, CUSTOMERNAME, CONTACTFIRSTNAME, CONTACTLASTNAME, CITY, COUNTRY FROM customers ORDER BY CUSTOMERNAME
    configurations:
      default:
        pipeline:
          - limit: 100

  customer:
    label: Customer Details
    description: Look up a specific customer by number
    datasource: secondary
    query: SELECT * FROM customers WHERE CUSTOMERNUMBER = ?
    parameters:
      - name: customerNumber
        type: number
        required: true
        label: Customer Number
        input:
          kind: number
    configurations:
      default:
        pipeline:
          - limit: 1

  customer-orders:
    label: Customer Orders
    description: View orders for a specific customer
    datasource: secondary
    query: SELECT o.ORDERNUMBER, o.ORDERDATE, o.STATUS, c.CUSTOMERNAME FROM orders o JOIN customers c ON o.CUSTOMERNUMBER = c.CUSTOMERNUMBER WHERE o.CUSTOMERNUMBER = ? ORDER BY o.ORDERDATE DESC
    parameters:
      - name: customerNumber
        type: number
        required: true
        label: Customer Number
        input:
          kind: number
    configurations:
      default:
        pipeline:
          - limit: 50

  high-value-customers:
    label: High Value Customers
    description: Customers with credit limit over 50000
    datasource: secondary
    query: SELECT CUSTOMERNUMBER, CUSTOMERNAME, CITY, COUNTRY, CREDITLIMIT FROM customers WHERE CREDITLIMIT > 50000 ORDER BY CREDITLIMIT DESC
    configurations:
      default:
        pipeline:
          - limit: 100

queries:
  products.base:
    datasource: default
    sql: SELECT * FROM products ORDER BY PRODUCTCODE
  productlines.base:
    datasource: default
    sql: SELECT * FROM productlines ORDER BY PRODUCTLINE

entities:
  products:
    label: Products
    description: Product catalog
    datasource: default
    table: PRODUCTS
    primaryKey: PRODUCTCODE
    fields:
      - PRODUCTCODE
      - PRODUCTNAME
      - PRODUCTLINE
      - BUYPRICE
      - QUANTITYINSTOCK
    security:
      read:
        roles: [GUEST, ADMIN]

  productlines:
    label: Product Lines
    description: Product line categories
    datasource: default
    table: PRODUCTLINES
    primaryKey: PRODUCTLINE
    fields:
      - PRODUCTLINE
      - TEXTDESCRIPTION
    security:
      read:
        roles: [GUEST, ADMIN]

  customers:
    label: Customers
    description: Customer records from secondary database
    datasource: default
    table: CUSTOMERS
    primaryKey: CUSTOMERNUMBER
    fields:
      - CUSTOMERNUMBER
      - CUSTOMERNAME
      - CONTACTFIRSTNAME
      - CONTACTLASTNAME
      - CITY
      - COUNTRY
    security:
      read:
        roles: [ADMIN]
