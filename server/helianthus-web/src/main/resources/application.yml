helianthus:
  catalog:
    path: ${HELIANTHUS_CATALOG_PATH:classpath:operations.yml}
  web:
    allowed-origins: ${HELIANTHUS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    oauth2:
      enabled: true
  seed:
    db: ${HELIANTHUS_SEED_DB:}
    init: ${HELIANTHUS_SEED_INIT:}
    operations: ${HELIANTHUS_SEED_OPERATIONS:}

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${HELIANTHUS_OIDC_ISSUER_URI:http://localhost:8081/realms/helianthus}
          jwk-set-uri: ${HELIANTHUS_OIDC_JWK_SET_URI:http://localhost:8081/realms/helianthus/protocol/openid-connect/certs}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:helianthus}
    username: ${POSTGRES_USER:helianthus}
    password: ${POSTGRES_PASSWORD:helianthus}
    driver-class-name: org.postgresql.Driver
  datasource-secondary:
    url: jdbc:postgresql://${POSTGRES_SECONDARY_HOST:localhost}:${POSTGRES_SECONDARY_PORT:5433}/${POSTGRES_SECONDARY_DB:helianthus_secondary}
    username: ${POSTGRES_SECONDARY_USER:helianthus_secondary}
    password: ${POSTGRES_SECONDARY_PASSWORD:helianthus_secondary}
    driver-class-name: org.postgresql.Driver
