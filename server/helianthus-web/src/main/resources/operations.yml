app:
  name: Helianthus API

datasources:
  default:
    type: postgres

queries:
  products.base:
    datasource: default
    sql: SELECT * FROM classicmodels.products
  productlines.base:
    datasource: default
    sql: SELECT * FROM classicmodels.productlines

operations:
  all-products:
    label: All Products
    description: List all products in the catalog
    query: SELECT * FROM classicmodels.products
    configurations:
      default:
        label: Default
        pipeline:
          - limit: 100

  all-productlines:
    label: All Product Lines
    description: List all product line categories
    query: SELECT * FROM classicmodels.productlines
    configurations:
      default:
        label: Default
        pipeline:
          - limit: 100

  get-product:
    label: Get Product
    description: Look up a specific product by code
    query: SELECT * FROM classicmodels.products where productCode = ?
    parameters:
      - name: productCode
        type: string
        required: true
        label: Product code
        description: The unique product identifier
        placeholder: S10_1678
    configurations:
      default:
        label: Default
        pipeline:
          - limit: 100

  products:
    label: Products
    description: Product catalog operations with filtering
    queryRef: products.base
    configurations:
      default:
        label: Default
        description: Standard product list
        pipeline:
          - limit: 100
      compact:
        label: Compact
        description: Projected columns only
        pipeline:
          - project: [productCode, productName, productLine]
          - limit: 50
      expensive:
        label: Expensive
        description: Products over $50
        pipeline:
          - filter:
              buyPrice:
                gt: 50
          - project: [productCode, productName, buyPrice]
          - limit: 100

entities:
  products:
    label: Products
    description: Product catalog
    datasource: default
    table: classicmodels.products
    primaryKey: productCode
    fields:
      - productCode
      - productName
      - productLine
      - buyPrice
      - quantityInStock
    security:
      read:
        roles: [GUEST, ADMIN]

  productlines:
    label: Product Lines
    description: Product line categories
    datasource: default
    table: classicmodels.productlines
    primaryKey: productLine
    fields:
      - productLine
      - textDescription
    security:
      read:
        roles: [GUEST, ADMIN]
