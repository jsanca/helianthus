app:
  name: Helianthus API

datasources:
  default:
    type: postgres

queries:
  products.base:
    datasource: default
    sql: |
      SELECT * FROM classicmodels.products
  productlines.base:
    datasource: default
    sql: |
      SELECT * FROM classicmodels.productlines

operations:
  all-products:
    query: |
      SELECT * FROM classicmodels.products
    configurations:
      default:
        pipeline:
          - limit: 100

  all-productlines:
    query: |
      SELECT * FROM classicmodels.productlines
    configurations:
      default:
        pipeline:
          - limit: 100

  get-product:
    query: |
      SELECT * FROM classicmodels.products where productCode = ?
    parameters:
      - name: productCode
        type: string
    configurations:
      default:
        pipeline:
          - limit: 100

  products:
    queryRef: products.base
    configurations:
      default:
        pipeline:
          - limit: 100
      compact:
        pipeline:
          - project: [productCode, productName, productLine]
          - limit: 50
      expensive:
        pipeline:
          - filter:
              buyPrice:
                gt: 50
          - project: [productCode, productName, buyPrice]
          - limit: 100
